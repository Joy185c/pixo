name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'PixoMobile/package-lock.json'

      - name: Install dependencies
        working-directory: ./PixoMobile
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        working-directory: ./PixoMobile/android
        run: chmod +x ./gradlew

      - name: Build Android Debug APK
        working-directory: ./PixoMobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixo-debug-apk
          path: PixoMobile/android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: "--max_old_space_size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'PixoMobile/package-lock.json'

      - name: Install dependencies
        working-directory: ./PixoMobile
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Configure Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> ./PixoMobile/android/gradle.properties
          echo "org.gradle.daemon=false" >> ./PixoMobile/android/gradle.properties
          echo "org.gradle.parallel=false" >> ./PixoMobile/android/gradle.properties

      - name: Make gradlew executable
        working-directory: ./PixoMobile/android
        run: chmod +x ./gradlew

      # ── FIX: Add extra Maven repos via init.gradle to resolve java-diff-utils 403 error ──
      - name: Configure Gradle init script with extra repositories
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
            buildscript {
              repositories {
                maven { url "https://jitpack.io" }
                maven { url "https://plugins.gradle.org/m2/" }
                mavenCentral()
                google()
              }
            }
            repositories {
              maven { url "https://jitpack.io" }
              maven { url "https://plugins.gradle.org/m2/" }
              mavenCentral()
              google()
            }
          }
          EOF


      - name: Build Android Release APK
        working-directory: ./PixoMobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixo-release-apk
          path: PixoMobile/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          if-no-files-found: error

      # ── Publish to GitHub Releases so download URL is stable ──
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Pixo Android APK (latest)"
          body: |
            Optimized Android Release APK — smaller size and faster performance.
            Install on your Android phone and open the Pixo app directly.
          prerelease: true
          files: PixoMobile/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk

name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: "--max_old_space_size=4096"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'PixoMobile/package-lock.json'

      - name: Install dependencies
        working-directory: ./PixoMobile
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Configure Gradle memory
        run: |
          echo "org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> ./PixoMobile/android/gradle.properties
          echo "org.gradle.daemon=false" >> ./PixoMobile/android/gradle.properties
          echo "org.gradle.parallel=false" >> ./PixoMobile/android/gradle.properties

      - name: Make gradlew executable
        working-directory: ./PixoMobile/android
        run: chmod +x ./gradlew

      # ── KEY FIX: Bundle JS into the APK so Metro is not needed ──
      - name: Create Android assets directory
        run: mkdir -p PixoMobile/android/app/src/main/assets

      - name: Bundle React Native JS (standalone mode)
        working-directory: ./PixoMobile
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Android Debug APK
        working-directory: ./PixoMobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixo-debug-apk
          path: PixoMobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ── Publish to GitHub Releases so download URL is stable ──
      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "Pixo Android APK (latest)"
          body: |
            Standalone Android debug APK — no Metro server required.
            Install on your Android phone and open the Pixo app directly.
          prerelease: true
          files: PixoMobile/android/app/build/outputs/apk/debug/app-debug.apk
